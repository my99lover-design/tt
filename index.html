<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔑 넘버원 김포B 공비</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header-area">
            <h1 id="appTitle">
    <div id="titleMain" style="font-size:3.0rem;font-weight:900;">
        넘버원🥇
    </div>

    <div id="titleSub" style="font-size:1.8rem;font-weight:600;color:var(--text-sub);">
        김포B 공비
    </div>
</h1>
            <button id="themeToggle" class="theme-toggle">🌙</button>
        </div>
        <div id="navContainer" class="nav-buttons-container">
            <button id="backBtn" class="nav-btn" onclick="goBack()">⬅️ 뒤로가기</button>
            <button id="homeBtn" class="nav-btn" onclick="resetSteps()">🏠 홈으로</button>
        </div>
        <div id="gpsSection" class="gps-section">
            <div class="gps-header-row">
                <div class="gps-title">📍 내 주변(GPS)</div>
                <div id="gpsStatusBadge" class="gps-status-badge">📡 신호 분석 중...</div>
            </div>
            <div id="gpsButtons" class="gps-buttons"></div>
        </div>
        <div id="commonPwdStandalone" class="common-pwd-area"></div>
        <div id="stepContainer" class="step-container">
            <div id="buttonGrid" class="btn-grid">데이터를 불러오는 중... ⏳</div>
        </div>
        <div id="cardList" class="card-list"></div>
    </div>
    <div id="commonEditorModal" class="modal">
        <div class="modal-content">
            <h3>⚙️ 공동비밀번호 수정</h3>
            <div class="form-group">
                <label id="commonModalAptLabel">아파트명</label>
                <input type="text" id="formCommonPwdValue">
            </div>
            <div class="modal-buttons">
                <button class="modal-btn btn-submit" onclick="submitCommonPwdForm()">저장</button>
                <button class="modal-btn btn-cancel" onclick="closeCommonModal()">취소</button>
            </div>
        </div>
    </div>
    <div id="editorModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">🔑 비밀번호 수정</h3>
            <input type="hidden" id="formRowId">
            <div id="readOnlyInfo" style="font-size: 0.9rem; color: var(--text-sub); margin-bottom: 10px;"></div>
            <div class="form-group">
                <label>새 비밀번호</label>
                <input type="text" id="formPwd" placeholder="변경할 번호를 입력하세요">
            </div>
            <div class="modal-buttons">
                <button class="modal-btn btn-submit" onclick="submitForm()">저장</button>
                <button class="modal-btn btn-cancel" onclick="closeModal()">취소</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
